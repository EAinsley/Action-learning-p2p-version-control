<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="200" height="180" fill="none"/>
  <!-- Monitor -->
  <rect x="50" y="30" width="100" height="70" rx="3" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="55" y="35" width="90" height="60" rx="1" fill="none" stroke="#333" stroke-width="1"/>
  <!-- Screen content -->
  <line x1="65" y1="60" x2="135" y2="60" stroke="#333" stroke-width="1"/>
  <line x1="65" y1="70" x2="120" y2="70" stroke="#333" stroke-width="1"/>
  <!-- Stand -->
  <rect x="80" y="100" width="40" height="5" fill="#333"/>
  <rect x="95" y="105" width="10" height="20" fill="#333"/>
  <rect x="60" y="125" width="80" height="5" rx="2" fill="#333"/>
  <!-- OS logos -->
  <text x="65" y="50" fill="#333" font-size="7" font-weight="bold">Win</text>
  <circle cx="100" cy="155" r="3" fill="#333"/>
  <circle cx="115" cy="155" r="3" fill="#333"/>
  <circle cx="85" cy="155" r="3" fill="#333"/>
</svg>
